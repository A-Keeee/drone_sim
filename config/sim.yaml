/**:
  ros__parameters:
    use_sim_time: false

quadrotor_dynamics_node:
  ros__parameters:
    mass: 1.0
    arm_length: 0.17
    inertia_x: 0.008
    inertia_y: 0.008
    inertia_z: 0.014
    thrust_coefficient: 8.54858e-6
    torque_coefficient: 1.6e-7
    motor_time_constant: 0.035
    max_rpm: 9000.0
    random_seed: 7
    imu_accel_noise: 0.025
    imu_gyro_noise: 0.002
    gps_position_noise: 0.04

position_controller_node:
  ros__parameters:
    # Vehicle parameters must match quadrotor_dynamics_node.
    mass: 1.0
    arm_length: 0.17
    inertia: [0.008, 0.008, 0.014]
    thrust_coefficient: 8.54858e-6
    torque_coefficient: 1.6e-7
    min_rpm: 0.0
    max_rpm: 9000.0

    # Near-critically-damped position and SO(3) loops.
    kp: [2.2, 2.2, 3.5]
    kv: [3.0, 3.0, 3.8]
    kr: [0.12, 0.12, 0.08]
    kw: [0.065, 0.065, 0.065]
    max_torque: [0.35, 0.35, 0.20]
    max_desired_rate: [1.5, 1.5, 1.0]
    desired_rate_filter_tau: 0.10
    max_horizontal_accel: 2.0
    max_vertical_accel: 2.5
    max_tilt: 0.40
    max_total_thrust_ratio: 1.8
    odom_timeout: 0.20
    # The planner runs A* asynchronously and continuously publishes a hover
    # reference while searching. This timeout remains a controller-side fallback.
    reference_timeout: 2.50

voxel_map_node:
  ros__parameters:
    resolution: 0.2
    origin: [-2.0, -4.0, 0.0]
    size: [12.0, 8.0, 5.0]
    # center xyz followed by size xyz; all obstacles are genuinely 3-D.
    obstacles: [1.5, 0.0, 1.2, 0.6, 2.0, 2.4,
                3.0, -1.2, 2.0, 0.8, 1.6, 4.0,
                4.0, 1.2, 2.0, 0.8, 1.6, 4.0,
                5.4, 0.0, 3.7, 0.8, 3.5, 1.0,
                6.8, 0.0, 1.3, 0.8, 4.5, 2.6]

simulated_lidar_node:
  ros__parameters:
    map_resolution: 0.2
    horizontal_fov_deg: 120.0
    vertical_fov_deg: 60.0
    horizontal_beams: 121
    vertical_beams: 31
    min_range: 0.2
    max_range: 8.0
    range_noise: 0.01
    dropout: 0.0
    random_seed: 17

ab_planner_node:
  ros__parameters:
    resolution: 0.2
    safety_distance: 0.5
    vehicle_radius: 0.18
    reference_speed: 0.8
    cruise_altitude: 1.5
    lidar_timeout: 2.0
    max_search_nodes: 250000
    heuristic_weight: 1.05
    auto_takeoff: true
    goal_tolerance: 0.15
    goal_velocity_tolerance: 0.15
    polyline_lookahead: 0.45
    spline_lookahead: 0.15
    mpc_horizon: 30
    mpc_dt: 0.05
    mpc_max_jerk: 3.0
    mpc_max_accel: 2.0
    mpc_max_velocity: 1.2
    mpc_kp: 2.0
    mpc_kv: 2.5
    # Index 3 is about 0.20 s ahead, instead of the old 0.80 s lead.
    mpc_command_index: 3
