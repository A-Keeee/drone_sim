/**:
  ros__parameters:
    use_sim_time: false

quadrotor_dynamics_node:
  ros__parameters:
    mass: 1.0
    arm_length: 0.17
    inertia_x: 0.008
    inertia_y: 0.008
    inertia_z: 0.014
    thrust_coefficient: 8.54858e-6
    torque_coefficient: 1.6e-7
    motor_time_constant: 0.035
    max_rpm: 9000.0
    random_seed: 7
    imu_accel_noise: 0.025
    imu_gyro_noise: 0.002
    gps_position_noise: 0.04

voxel_map_node:
  ros__parameters:
    resolution: 0.2
    origin: [-2.0, -4.0, 0.0]
    size: [12.0, 8.0, 5.0]
    # center xyz followed by size xyz; all obstacles are genuinely 3-D.
    obstacles: [1.5, 0.0, 1.2, 0.6, 2.0, 2.4,
                3.0, -1.2, 2.0, 0.8, 1.6, 4.0,
                4.0, 1.2, 2.0, 0.8, 1.6, 4.0,
                5.4, 0.0, 3.7, 0.8, 3.5, 1.0,
                6.8, 0.0, 1.3, 0.8, 4.5, 2.6]

simulated_lidar_node:
  ros__parameters:
    map_resolution: 0.2
    horizontal_fov_deg: 120.0
    vertical_fov_deg: 60.0
    horizontal_beams: 121
    vertical_beams: 31
    min_range: 0.2
    max_range: 8.0
    range_noise: 0.01
    dropout: 0.0
    random_seed: 17

ab_planner_node:
  ros__parameters:
    resolution: 0.2
    safety_distance: 0.5
    vehicle_radius: 0.18
    reference_speed: 1.2
    cruise_altitude: 1.5
    lidar_timeout: 2.0
    max_search_nodes: 250000
    heuristic_weight: 1.05
    auto_takeoff: true
